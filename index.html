<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Biblioteca</title>
</head>
<body>

<button onclick="crearBoton()">Crear nueva etiqueta</button>

<div id="contenedor"></div>

<script>
async function cargarBotones() {
  const res = await fetch("http://localhost:3000/botones");
  const data = await res.json();

  const contenedor = document.getElementById("contenedor");
  contenedor.innerHTML = "";

  data.forEach(btn => {
    const b = document.createElement("button");
    b.innerHTML = `<img src="${btn.icono}" width="40"><br>${btn.texto}`;
    contenedor.appendChild(b);
  });
}
